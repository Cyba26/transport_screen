<!DOCTYPE html>
<html lang="fr" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Transport Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #4f8ef7;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --ok: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --grid-color: rgba(79,142,247,0.03);
    --shadow: none;
  }

  :root.light {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --border: #dde3f0;
    --accent: #2563eb;
    --text: #0f172a;
    --muted: #94a3b8;
    --ok: #16a34a;
    --warn: #d97706;
    --danger: #dc2626;
    --grid-color: rgba(37,99,235,0.04);
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    padding: 16px 20px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* STATION SELECTOR (top of page) */
  .station-selector {
    display: none;
    gap: 8px;
  }

  .station-selector.visible { display: flex; }

  .station-pill {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 6px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s, color 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .station-pill img {
    height: 18px;
    width: auto;
  }

  .station-pill.active {
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }

  .station-info h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .station-info .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .line-badge {
    height: 40px;
    width: auto;
    flex-shrink: 0;
  }

  /* WALK TAG (inline in subtitle) */
  .walk-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(79,142,247,0.1);
    padding: 1px 6px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: 6px;
    transition: background 0.2s;
  }
  .walk-tag:active { background: rgba(79,142,247,0.2); }

  /* WALK TIME POPUP */
  .walk-popup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    display: none;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow);
    animation: slideIn 0.2s ease forwards;
  }

  .walk-popup.visible { display: flex; }

  .walk-popup .walk-text {
    font-size: 13px;
    color: var(--muted);
  }

  .walk-popup .walk-text strong {
    color: var(--text);
    font-weight: 600;
  }

  .walk-popup input[type=range] {
    flex: 1;
    min-width: 0;
    height: 40px;
    accent-color: var(--accent);
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    background: none;
    padding: 0;
    margin: 0;
  }

  .walk-popup input[type=range]::-webkit-slider-runnable-track {
    height: 8px;
    border-radius: 4px;
    background: var(--border);
    border: none;
  }

  .walk-popup input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: -11px;
    border: 2px solid var(--surface);
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  /* Firefox */
  .walk-popup input[type=range]::-moz-range-track {
    height: 8px;
    border-radius: 4px;
    background: var(--border);
    border: none;
  }

  .walk-popup input[type=range]::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--surface);
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .walk-value {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    min-width: 36px;
    text-align: center;
  }

  /* SECTION HEADER with update time */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: -8px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .last-update {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .pulse-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ok);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* TRAINS */
  .trains-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .train-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
    box-shadow: var(--shadow);
  }

  .train-card:nth-child(1) { animation-delay: 0.05s; }
  .train-card:nth-child(2) { animation-delay: 0.12s; }
  .train-card:nth-child(3) { animation-delay: 0.19s; }

  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .train-card.urgent {
    border-color: rgba(239,68,68,0.3);
    background: rgba(239,68,68,0.05);
  }

  .train-card.soon {
    border-color: rgba(245,158,11,0.25);
  }

  .train-card::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
    opacity: 0.6;
  }

  .train-card.urgent::before { background: var(--danger); opacity: 0.8; }
  .train-card.soon::before { background: var(--warn); opacity: 0.8; }

  .time-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 52px;
  }

  .time-display {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .time-real {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  .train-info {
    flex: 1;
    min-width: 0;
  }

  .destination {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }

  .mission-code {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.06em;
  }

  .countdown {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .mins {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
  }

  .mins-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .mins.ok { color: var(--ok); }
  .mins.warn { color: var(--warn); }
  .mins.danger { color: var(--danger); }

  .leave-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text);
    margin-top: 3px;
    text-align: right;
    opacity: 0.7;
  }

  .leave-time.late {
    color: var(--danger);
    opacity: 1;
  }

  /* PERTURBATIONS */
  .perturbations {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .perturbation-card {
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.5;
    color: #d4a847;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
  }

  .perturbation-card .pert-title {
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .no-perturbation {
    background: rgba(34,197,94,0.05);
    border: 1px solid rgba(34,197,94,0.15);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 12px;
    color: #4ade80;
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* FOOTER */
  .footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    padding-bottom: 8px;
  }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 18px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, transform 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .refresh-btn:active { transform: scale(0.9); }
  .refresh-btn.spinning { animation: spin 0.6s linear; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 16px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, transform 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: var(--shadow);
  }
  .theme-toggle:active { transform: scale(0.9); }

  /* LOADING / ERROR */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 16px;
    height: 78px;
  }

  @keyframes shimmer { to { background-position: -200% 0; } }

  .error-card {
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    font-size: 13px;
    color: #f87171;
    line-height: 1.5;
  }

  .api-setup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }

  .api-setup h2 { font-size: 16px; margin-bottom: 8px; }
  .api-setup p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }

  .api-input-group { display: flex; gap: 8px; }

  .api-input-group input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input-group input:focus { border-color: var(--accent); }
  .api-input-group input::placeholder { color: var(--muted); }

  .btn-primary {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 16px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }
</style>
</head>
<body>
<div class="container">

  <!-- STATION SELECTOR (top) -->
  <div class="station-selector" id="station-selector">
    <div class="station-pill active" data-station="laplace" onclick="switchStation(this)">
      <img src="img/RER_B.svg" alt="RER B"> Laplace
    </div>
    <div class="station-pill" data-station="bicetre" onclick="switchStation(this)">
      <img src="img/Ligne_14.svg" alt="M14"> Bicêtre
    </div>
    <div class="station-pill" data-station="barbara" onclick="switchStation(this)">
      <img src="img/Ligne_4.svg" alt="M4"> Barbara
    </div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <div class="station-info">
      <h1 id="station-name">Laplace</h1>
      <div class="subtitle">direction Paris • <span class="clock" id="clock">--:--</span> <span class="walk-tag" id="walk-tag" onclick="toggleWalkPopup()">5m</span></div>
    </div>
    <img class="line-badge" id="line-badge" src="img/RER_B.svg" alt="RER B">
  </div>

  <!-- API KEY SETUP (shown if no key) -->
  <div class="api-setup" id="setup-panel" style="display:none">
    <h2>Cle API PRIM</h2>
    <p>Cree un compte sur <strong>prim.iledefrance-mobilites.fr</strong> et genere une cle API dans ton profil.</p>
    <div class="api-input-group">
      <input type="text" id="api-key-input" placeholder="Ta cle API PRIM..." autocomplete="off" />
      <button class="btn-primary" onclick="saveApiKey()">OK</button>
    </div>
  </div>

  <!-- WALK TIME POPUP (hidden by default) -->
  <div class="walk-popup" id="walk-popup">
    <span class="walk-text">Marche : <strong id="walk-label">5 min</strong></span>
    <input type="range" id="walk-slider" min="1" max="20" value="5" oninput="updateWalk(this.value)" />
    <span class="walk-value" id="walk-display">5m</span>
  </div>

  <!-- TRAINS -->
  <div class="section-header">
    <div class="section-label">Prochains passages</div>
    <div class="last-update">
      <div class="pulse-dot" id="pulse-dot"></div>
      <span id="last-update-text">chargement...</span>
    </div>
  </div>
  <div class="trains-list" id="trains-list">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <!-- PERTURBATIONS -->
  <div class="section-label" style="margin-bottom:-8px">Trafic</div>
  <div class="perturbations" id="perturbations">
    <div class="skeleton" style="height:50px"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Theme">🌙</button>
    <button class="refresh-btn" id="refresh-btn" onclick="fetchData()" title="Actualiser">↻</button>
  </div>

</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const STATIONS = {
  laplace: {
    name: "Laplace",
    stopAreaId: "STIF:StopArea:SP:43607:",
    lineRef: "STIF:Line::C01743:",
    lineName: "B",
    lineImg: "img/RER_B.svg",
    filterDest: dest => !['robinson','massy','palaiseau','orsay','gif','saint-rémy','limours'].some(k => dest.includes(k)),
  },
  bicetre: {
    name: "Hôp. Bicêtre",
    stopAreaId: "STIF:StopPoint:Q:490849:",
    lineRef: "STIF:Line::C01384:",
    lineName: "14",
    lineImg: "img/Ligne_14.svg",
    filterDest: dest => true, // TODO: affiner quand on voit les destinations en console
  },
  barbara: {
    name: "Barbara",
    stopAreaId: "STIF:StopPoint:Q:483313:",
    lineRef: "STIF:Line::C01374:",
    lineName: "4",
    lineImg: "img/Ligne_4.svg",
    filterDest: dest => true, // TODO: affiner quand on voit les destinations en console
  }
};

const MAX_TRAINS = 3;
const REFRESH_INTERVAL = 20000; // 20s

let walkMinutes = 5;
let currentStation = 'laplace';
let refreshTimer = null;

// ─── API KEY ──────────────────────────────────────────────
function getApiKey() {
  return localStorage.getItem('prim_api_key') || '';
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  localStorage.setItem('prim_api_key', key);
  document.getElementById('setup-panel').style.display = 'none';
  document.getElementById('station-selector').classList.add('visible');
  fetchData();
}

// ─── CLOCK ────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000);
updateClock();

// ─── WALK TIME (per station) ─────────────────────────────
function getWalkKey() {
  return `walk_minutes_${currentStation}`;
}

function updateWalk(val) {
  walkMinutes = parseInt(val);
  document.getElementById('walk-label').textContent = `${val} min`;
  document.getElementById('walk-display').textContent = `${val}m`;
  document.getElementById('walk-tag').textContent = `${val}m`;
  localStorage.setItem(getWalkKey(), val);
  renderTrainsFromCache();
}

function loadWalkForStation() {
  const saved = localStorage.getItem(getWalkKey());
  walkMinutes = saved ? parseInt(saved) : 5;
  document.getElementById('walk-slider').value = walkMinutes;
  document.getElementById('walk-label').textContent = `${walkMinutes} min`;
  document.getElementById('walk-display').textContent = `${walkMinutes}m`;
  document.getElementById('walk-tag').textContent = `${walkMinutes}m`;
}

function toggleWalkPopup() {
  document.getElementById('walk-popup').classList.toggle('visible');
}

function renderTrainsFromCache() {
  if (window._lastTrains) renderTrains(window._lastTrains);
}

// ─── STATION SWITCH ───────────────────────────────────────
function switchStation(el) {
  document.querySelectorAll('.station-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  currentStation = el.dataset.station;
  const st = STATIONS[currentStation];
  document.getElementById('station-name').textContent = st.name;
  document.getElementById('line-badge').src = st.lineImg;
  document.getElementById('line-badge').alt = st.lineName;
  loadWalkForStation();
  document.getElementById('walk-popup').classList.remove('visible');
  document.getElementById('trains-list').innerHTML = `
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>`;
  document.getElementById('perturbations').innerHTML = `<div class="skeleton" style="height:50px"></div>`;
  fetchData();
}

// ─── FETCH ────────────────────────────────────────────────
async function fetchData() {
  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('setup-panel').style.display = 'block';
    document.getElementById('trains-list').innerHTML = '';
    document.getElementById('perturbations').innerHTML = '';
    return;
  }

  document.getElementById('station-selector').classList.add('visible');
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  const station = STATIONS[currentStation];

  try {
    const passagesUrl = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${encodeURIComponent(station.stopAreaId)}&LineRef=${encodeURIComponent(station.lineRef)}&MaximumStopVisits=10`;

    const passagesRes = await fetch(passagesUrl, {
      headers: { 'apiKey': apiKey }
    });

    if (!passagesRes.ok) throw new Error(`HTTP ${passagesRes.status}`);
    const passagesData = await passagesRes.json();

    const visits = passagesData?.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
    window._lastTrains = visits;
    renderTrains(visits);

    const pertUrl = `https://prim.iledefrance-mobilites.fr/marketplace/general-message?LineRef=${encodeURIComponent(station.lineRef)}`;
    const pertRes = await fetch(pertUrl, { headers: { 'apiKey': apiKey } });
    if (pertRes.ok) {
      const pertData = await pertRes.json();
      const messages = pertData?.Siri?.ServiceDelivery?.GeneralMessageDelivery?.[0]?.InfoMessage || [];
      renderPerturbations(messages);
    }

    const now = new Date();
    document.getElementById('last-update-text').textContent =
      now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('pulse-dot').style.background = 'var(--ok)';

  } catch (err) {
    console.error(err);
    document.getElementById('trains-list').innerHTML = `
      <div class="error-card">
        Impossible de recuperer les donnees.<br>
        <small>Verifie ta cle API ou ta connexion.</small><br><br>
        <small style="opacity:0.6">${err.message}</small>
      </div>`;
    document.getElementById('pulse-dot').style.background = 'var(--danger)';
  }

  btn.classList.remove('spinning');
}

// ─── RENDER TRAINS ────────────────────────────────────────
function renderTrains(visits) {
  const now = new Date();
  const container = document.getElementById('trains-list');

  const station = STATIONS[currentStation];

  // Filter by direction
  let dirFiltered = visits.filter(v => {
    const dest = (v.MonitoredVehicleJourney?.DestinationName?.[0]?.value || '').toLowerCase();
    return station.filterDest(dest);
  });

  console.log('Destinations recues:', visits.slice(0, 6).map(v =>
    v.MonitoredVehicleJourney?.DestinationName?.[0]?.value
  ));

  const candidates = dirFiltered.length > 0 ? dirFiltered : visits;

  // Compute adjusted minutes for each train
  const withTiming = candidates.map(v => {
    const call = v.MonitoredVehicleJourney?.MonitoredCall;
    const rawTime = call?.ExpectedDepartureTime || call?.AimedDepartureTime || call?.ExpectedArrivalTime || call?.AimedArrivalTime;
    if (!rawTime) return null;
    const depTime = new Date(rawTime);
    const diffMins = Math.round((depTime - now) / 60000);
    const adjustedMins = diffMins - walkMinutes;
    return { visit: v, depTime, diffMins, adjustedMins };
  }).filter(Boolean);

  // Show at most 1 missed train (the most recent one) + next 2 catchable
  const missed = withTiming.filter(t => t.adjustedMins <= 0);
  const catchable = withTiming.filter(t => t.adjustedMins > 0);

  const toShow = [];
  if (missed.length > 0) toShow.push(missed[missed.length - 1]); // last missed = closest
  toShow.push(...catchable.slice(0, MAX_TRAINS - toShow.length));

  if (toShow.length === 0) {
    container.innerHTML = `<div class="error-card">Aucun passage trouve pour cette station.</div>`;
    return;
  }

  container.innerHTML = toShow.map((t, i) => {
    const journey = t.visit.MonitoredVehicleJourney;
    const dest = journey?.DestinationName?.[0]?.value || 'Inconnu';
    const mission = journey?.JourneyNote?.[0]?.value || '';
    const timeStr = t.depTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

    // "Partir a" = heure du train - temps de marche
    const leaveAt = new Date(t.depTime.getTime() - walkMinutes * 60000);
    const leaveStr = leaveAt.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

    let urgencyClass = '';
    let minsClass = 'ok';
    if (t.adjustedMins <= 0) { urgencyClass = 'urgent'; minsClass = 'danger'; }
    else if (t.adjustedMins <= 3) { urgencyClass = 'soon'; minsClass = 'warn'; }

    const minsDisplay = t.adjustedMins <= 0 ? 'rate' : `${t.adjustedMins}`;
    const minsLabel = t.adjustedMins <= 0 ? '' : 'min';
    const lateClass = t.adjustedMins <= 0 ? ' late' : '';

    return `
      <div class="train-card ${urgencyClass}" style="animation-delay:${i * 0.07}s">
        <div class="time-block">
          <div class="time-display">${timeStr}</div>
          <div class="time-real">depart</div>
        </div>
        <div class="train-info">
          <div class="destination">${dest}</div>
          ${mission ? `<div class="mission-code">${mission}</div>` : ''}
        </div>
        <div class="countdown">
          <div class="mins ${minsClass}">${minsDisplay}</div>
          <div class="mins-label">${minsLabel}</div>
          <div class="leave-time${lateClass}">${t.adjustedMins <= 0 ? `parti ${leaveStr}` : `partir ${leaveStr}`}</div>
        </div>
      </div>`;
  }).join('');
}

// ─── RENDER PERTURBATIONS ─────────────────────────────────
function renderPerturbations(messages) {
  const container = document.getElementById('perturbations');

  console.log('Perturbations brutes:', JSON.stringify(messages.slice(0, 2), null, 2));

  const active = messages.filter(m => {
    const validity = m.ValidUntilTime;
    if (!validity) return true;
    return new Date(validity) > new Date();
  });

  if (active.length === 0) {
    container.innerHTML = `
      <div class="no-perturbation">
        <span>✓</span> Trafic normal sur la ligne ${STATIONS[currentStation].lineName}
      </div>`;
    return;
  }

  container.innerHTML = active.slice(0, 3).map((m, i) => {
    // Deep extract: recursively find all long text values in the message object
    function extractTexts(obj, depth) {
      if (!obj || depth > 8) return [];
      if (typeof obj === 'string') return obj.length > 20 ? [obj] : [];
      if (Array.isArray(obj)) return obj.flatMap(item => extractTexts(item, depth + 1));
      if (typeof obj === 'object') {
        const results = [];
        // Prioritize known text fields
        for (const key of ['value', 'MessageText', 'Content', 'Message', 'InfoMessageVersion']) {
          if (obj[key] !== undefined) {
            results.push(...extractTexts(obj[key], depth + 1));
          }
        }
        if (results.length === 0) {
          for (const val of Object.values(obj)) {
            results.push(...extractTexts(val, depth + 1));
          }
        }
        return results;
      }
      return [];
    }

    const allTexts = extractTexts(m, 0);
    // Pick the longest text as the most informative
    const content = allTexts.sort((a, b) => b.length - a.length)[0] || 'Perturbation en cours';

    // Clean up title - use short text or fallback
    let title = 'Info trafic';
    const rawTitle = m.InfoMessageIdentifier?.value || '';
    if (rawTitle.length > 40) {
      title = 'Info trafic';
    } else if (rawTitle) {
      title = rawTitle;
    }

    return `
      <div class="perturbation-card" style="animation-delay:${i * 0.08}s">
        <div class="pert-title">${title}</div>
        <div>${content}</div>
      </div>`;
  }).join('');
}

// ─── THEME ────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isLight ? '🌙' : '☀️';
}

function applyTheme() {
  const saved = localStorage.getItem('theme');
  // Default to light
  const preferLight = saved ? saved === 'light' : true;
  if (preferLight) {
    document.documentElement.classList.add('light');
    document.getElementById('theme-btn').textContent = '🌙';
  } else {
    document.documentElement.classList.remove('light');
    document.getElementById('theme-btn').textContent = '☀️';
  }
}

// ─── INIT ─────────────────────────────────────────────────
function init() {
  applyTheme();
  loadWalkForStation();

  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('setup-panel').style.display = 'block';
    document.getElementById('trains-list').innerHTML = '';
    document.getElementById('perturbations').innerHTML = '';
  } else {
    document.getElementById('station-selector').classList.add('visible');
    fetchData();
    refreshTimer = setInterval(fetchData, REFRESH_INTERVAL);
  }

  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }
}

init();
</script>
