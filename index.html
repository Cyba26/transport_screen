<!DOCTYPE html>
<html lang="fr" class="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Transport Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #4f8ef7;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --ok: #22c55e;
    --warn: #f59e0b;
    --danger: #ef4444;
    --grid-color: rgba(79,142,247,0.03);
    --shadow: none;
  }

  :root.light {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --border: #dde3f0;
    --accent: #2563eb;
    --text: #0f172a;
    --muted: #94a3b8;
    --ok: #16a34a;
    --warn: #d97706;
    --danger: #dc2626;
    --grid-color: rgba(37,99,235,0.04);
    --shadow: 0 1px 4px rgba(0,0,0,0.07);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    padding: 16px 20px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* STATION SELECTOR (top of page) */
  .station-selector {
    display: none;
    gap: 8px;
  }

  .station-selector.visible { display: flex; }

  .station-pill {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 6px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    text-align: center;
    transition: border-color 0.2s, color 0.2s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .station-pill img {
    height: 18px;
    width: auto;
  }

  .station-pill.active {
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .header .line-badge {
    height: 42px;
    width: auto;
    flex-shrink: 0;
  }

  .station-info h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  .station-info .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* WALK TAG (inline in subtitle) */
  .walk-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(79,142,247,0.1);
    padding: 1px 6px;
    border-radius: 4px;
    cursor: pointer;
    margin-left: 6px;
    transition: background 0.2s;
  }
  .walk-tag:active { background: rgba(79,142,247,0.2); }

  /* WALK TIME POPUP */
  .walk-popup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    display: none;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow);
    animation: slideIn 0.2s ease forwards;
  }

  .walk-popup.visible { display: flex; }

  .walk-popup .walk-text {
    font-size: 13px;
    color: var(--muted);
  }

  .walk-popup .walk-text strong {
    color: var(--text);
    font-weight: 600;
  }

  .walk-popup input[type=range] {
    flex: 1;
    min-width: 0;
    height: 40px;
    accent-color: var(--accent);
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    background: none;
    padding: 0;
    margin: 0;
  }

  .walk-popup input[type=range]::-webkit-slider-runnable-track {
    height: 8px;
    border-radius: 4px;
    background: var(--border);
    border: none;
  }

  .walk-popup input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: -11px;
    border: 2px solid var(--surface);
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  /* Firefox */
  .walk-popup input[type=range]::-moz-range-track {
    height: 8px;
    border-radius: 4px;
    background: var(--border);
    border: none;
  }

  .walk-popup input[type=range]::-moz-range-thumb {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--surface);
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  }

  .walk-value {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    min-width: 36px;
    text-align: center;
  }

  /* SECTION HEADER with update time */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: -8px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .last-update {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .pulse-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ok);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* TRAINS */
  .trains-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .train-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    transform: translateY(8px);
    box-shadow: var(--shadow);
  }

  .train-card:nth-child(1) { animation-delay: 0.05s; }
  .train-card:nth-child(2) { animation-delay: 0.12s; }
  .train-card:nth-child(3) { animation-delay: 0.19s; }

  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .train-card.urgent {
    border-color: rgba(239,68,68,0.3);
    background: rgba(239,68,68,0.05);
  }

  .train-card.soon {
    border-color: rgba(245,158,11,0.25);
  }

  .train-card::before {
    content: '';
    position: absolute;
    left: 0; top: 20%; bottom: 20%;
    width: 3px;
    background: var(--accent);
    border-radius: 0 2px 2px 0;
    opacity: 0.6;
  }

  .train-card.urgent::before { background: var(--danger); opacity: 0.8; }
  .train-card.soon::before { background: var(--warn); opacity: 0.8; }

  .time-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 52px;
  }

  .time-display {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
  }

  .time-real {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  .train-info {
    flex: 1;
    min-width: 0;
  }

  .destination {
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }

  .mission-code {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    letter-spacing: 0.06em;
  }

  .countdown {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .mins {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
  }

  .mins-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .mins.ok { color: var(--ok); }
  .mins.warn { color: var(--warn); }
  .mins.danger { color: var(--danger); }

  .leave-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text);
    margin-top: 3px;
    text-align: right;
    opacity: 0.7;
  }

  .leave-time.late {
    color: var(--danger);
    opacity: 1;
  }

  /* FREQUENCY BANNER */
  .freq-banner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    box-shadow: var(--shadow);
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
    text-align: center;
  }

  .freq-banner .freq-value {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 500;
    color: var(--accent);
    line-height: 1;
  }

  .freq-banner .freq-label {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
  }

  .freq-banner .freq-next {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  /* PERTURBATIONS */
  .perturbations {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .perturbation-card {
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.5;
    animation: slideIn 0.3s ease forwards;
    opacity: 0;
  }

  /* Severity: info (blue) */
  .perturbation-card.sev-info {
    background: rgba(79,142,247,0.06);
    border: 1px solid rgba(79,142,247,0.2);
    color: #6b9cf7;
  }
  .perturbation-card.sev-info .pert-title { color: #4f8ef7; }

  /* "En cours" active perturbation — orange left stroke */
  .perturbation-card.is-active {
    border-left: 3px solid #f59e0b;
  }

  /* Severity: warn (orange) */
  .perturbation-card.sev-warn {
    background: rgba(245,158,11,0.06);
    border: 1px solid rgba(245,158,11,0.2);
    color: #d4a847;
  }
  .perturbation-card.sev-warn .pert-title { color: #f59e0b; }

  /* Severity: critical (red) */
  .perturbation-card.sev-critical {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
    color: #f87171;
  }
  .perturbation-card.sev-critical .pert-title { color: #ef4444; }

  .perturbation-card .pert-title {
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .perturbation-card .pert-content {
    margin-top: 4px;
  }

  .perturbation-card .pert-planning {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid currentColor;
    border-top-color: inherit;
    opacity: 0.6;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .pert-planning .plan-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pert-planning .plan-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .pert-planning .plan-dot.now {
    background: var(--danger);
    box-shadow: 0 0 6px var(--danger);
  }

  .pert-branch-tag {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .pert-branch-tag.other {
    background: rgba(148,163,184,0.15);
    color: var(--muted);
  }
  .pert-branch-tag.mine {
    background: rgba(239,68,68,0.12);
    color: var(--danger);
  }

  /* PLANNING CALENDAR */
  .planning-section {
    margin-top: 4px;
  }

  .planning-title {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .planning-grid {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .planning-week {
    display: flex;
    gap: 2px;
    align-items: center;
  }

  .planning-week-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    width: 42px;
    flex-shrink: 0;
    text-align: right;
    padding-right: 4px;
  }

  .planning-day {
    flex: 1;
    height: 14px;
    border-radius: 2px;
    background: var(--border);
    position: relative;
    min-width: 0;
  }

  /* Current week = much bigger */
  .planning-week.current-week .planning-day {
    height: 36px;
    border-radius: 6px;
  }
  .planning-week.current-week .planning-week-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
  }

  .planning-day.has-pert { background: rgba(245,158,11,0.35); }
  .planning-day.has-critical { background: rgba(239,68,68,0.4); }
  .planning-day.today {
    outline: 2px solid var(--accent);
    outline-offset: -1px;
    border-radius: 4px;
  }
  .planning-day.past { opacity: 0.35; }

  .planning-day-labels {
    display: flex;
    gap: 2px;
    margin-bottom: 2px;
    padding-left: 46px;
  }

  .planning-day-labels span {
    flex: 1;
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    color: var(--muted);
    text-align: center;
  }

  .no-perturbation {
    background: rgba(34,197,94,0.05);
    border: 1px solid rgba(34,197,94,0.15);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 12px;
    color: #4ade80;
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* FOOTER */
  .footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    padding-bottom: 8px;
  }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 18px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, transform 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .refresh-btn:active { transform: scale(0.9); }
  .refresh-btn.spinning { animation: spin 0.6s linear; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .theme-toggle {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-size: 16px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, transform 0.15s;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-shadow: var(--shadow);
  }
  .theme-toggle:active { transform: scale(0.9); }

  /* LOADING / ERROR */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--border) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 16px;
    height: 78px;
  }

  @keyframes shimmer { to { background-position: -200% 0; } }

  .error-card {
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
    font-size: 13px;
    color: #f87171;
    line-height: 1.5;
  }

  .api-setup {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
  }

  .api-setup h2 { font-size: 16px; margin-bottom: 8px; }
  .api-setup p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.5; }

  .api-input-group { display: flex; gap: 8px; }

  .api-input-group input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input-group input:focus { border-color: var(--accent); }
  .api-input-group input::placeholder { color: var(--muted); }

  .btn-primary {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 10px 16px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
  }

  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

  .reset-api-btn {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    padding: 4px 8px;
    opacity: 0.5;
    transition: opacity 0.2s;
  }
  .reset-api-btn:active { opacity: 1; }
</style>
</head>
<body>
<div class="container">

  <!-- STATION SELECTOR (top) -->
  <div class="station-selector" id="station-selector">
    <div class="station-pill active" data-station="laplace" onclick="switchStation(this)">
      <img src="img/RER_B.svg" alt="RER B"> Laplace
    </div>
    <div class="station-pill" data-station="bicetre" onclick="switchStation(this)">
      <img src="img/Ligne_14.svg" alt="M14"> Bicêtre
    </div>
    <div class="station-pill" data-station="barbara" onclick="switchStation(this)">
      <img src="img/Ligne_4.svg" alt="M4"> Barbara
    </div>
  </div>

  <!-- HEADER -->
  <div class="header">
    <img class="line-badge" id="line-badge" src="img/RER_B.svg" alt="RER B">
    <div class="station-info">
      <h1 id="station-name">Laplace</h1>
      <div class="subtitle">direction Paris • <span class="clock" id="clock">--:--</span> <span class="walk-tag" id="walk-tag" onclick="toggleWalkPopup()">5m</span></div>
    </div>
  </div>

  <!-- API KEY SETUP (shown if no key) -->
  <div class="api-setup" id="setup-panel" style="display:none">
    <h2>Cle API PRIM</h2>
    <p>Cree un compte sur <strong>prim.iledefrance-mobilites.fr</strong> et genere une cle API dans ton profil.</p>
    <div class="api-input-group">
      <input type="text" id="api-key-input" placeholder="Ta cle API PRIM..." autocomplete="off" />
      <button class="btn-primary" onclick="saveApiKey()">OK</button>
    </div>
  </div>

  <!-- WALK TIME POPUP (hidden by default) -->
  <div class="walk-popup" id="walk-popup">
    <span class="walk-text">Marche : <strong id="walk-label">5 min</strong></span>
    <input type="range" id="walk-slider" min="1" max="20" value="5" oninput="updateWalk(this.value)" />
    <span class="walk-value" id="walk-display">5m</span>
  </div>

  <!-- TRAINS -->
  <div class="section-header">
    <div class="section-label">Prochains passages</div>
    <div class="last-update">
      <div class="pulse-dot" id="pulse-dot"></div>
      <span id="last-update-text">chargement...</span>
    </div>
  </div>
  <div class="trains-list" id="trains-list">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>

  <!-- PLANNING -->
  <div class="planning-section" id="planning-section" style="display:none">
    <div class="planning-title">Planning perturbations</div>
    <div id="planning-calendar"></div>
  </div>

  <!-- PERTURBATIONS -->
  <div class="section-label" style="margin-bottom:-8px">Trafic</div>
  <div class="perturbations" id="perturbations">
    <div class="skeleton" style="height:50px"></div>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button class="reset-api-btn" onclick="resetApiKey()">reset API</button>
    <div style="display:flex;gap:8px">
      <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Theme">🌙</button>
      <button class="refresh-btn" id="refresh-btn" onclick="fetchData()" title="Actualiser">↻</button>
    </div>
  </div>

</div>

// ─── API KEY ──────────────────────────────────────────────
function getApiKey() {

// ─── FETCH ────────────────────────────────────────────────
async function fetchData() {
  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('setup-panel').style.display = 'block';
    document.getElementById('trains-list').innerHTML = '';
    document.getElementById('perturbations').innerHTML = '';
    return;
  }

  document.getElementById('station-selector').classList.add('visible');
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');

  const station = STATIONS[currentStation];
  const passagesUrl = `https://prim.iledefrance-mobilites.fr/marketplace/stop-monitoring?MonitoringRef=${station.stopAreaId}&LineRef=${station.lineRef}`;

  try {

    const passagesRes = await fetch(passagesUrl, {
      headers: { 'apiKey': apiKey }
    });

    const passagesData = await passagesRes.json();
    // PRIM sometimes returns 400 with valid SIRI data
    if (!passagesRes.ok && !passagesData?.Siri) {
      throw new Error(`HTTP ${passagesRes.status}`);
    }

    const visits = passagesData?.Siri?.ServiceDelivery?.StopMonitoringDelivery?.[0]?.MonitoredStopVisit || [];
    window._lastTrains = visits;
    renderTrains(visits);

    const pertUrl = `https://prim.iledefrance-mobilites.fr/marketplace/general-message?LineRef=${station.lineRef}`;
    const pertRes = await fetch(pertUrl, { headers: { 'apiKey': apiKey } });
    if (pertRes.ok) {
      const pertData = await pertRes.json();
      const messages = pertData?.Siri?.ServiceDelivery?.GeneralMessageDelivery?.[0]?.InfoMessage || [];
      renderPerturbations(messages);
    }

    const now = new Date();
    document.getElementById('last-update-text').textContent =
      now.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('pulse-dot').style.background = 'var(--ok)';

  } catch (err) {
    console.error('Fetch error:', err, passagesUrl);
    document.getElementById('trains-list').innerHTML = `
      <div class="error-card">
        Impossible de recuperer les donnees.<br>
        <small>Verifie ta cle API ou ta connexion.</small><br><br>
        <small style="opacity:0.6;word-break:break-all">${err.message}</small>
      </div>`;
    document.getElementById('pulse-dot').style.background = 'var(--danger)';
  }

  btn.classList.remove('spinning');
}

// ─── RENDER TRAINS ────────────────────────────────────────
function renderTrains(visits) {
  const now = new Date();
  const container = document.getElementById('trains-list');

  const station = STATIONS[currentStation];

  // Filter by direction
  let dirFiltered = visits.filter(v => {
    const dest = (v.MonitoredVehicleJourney?.DestinationName?.[0]?.value || '').toLowerCase();
    return station.filterDest(dest);
  });

  console.log('Destinations recues:', visits.slice(0, 6).map(v =>
    v.MonitoredVehicleJourney?.DestinationName?.[0]?.value
  ));

  const candidates = dirFiltered.length > 0 ? dirFiltered : visits;

  // Compute adjusted minutes for each train
  const withTiming = candidates.map(v => {
    const call = v.MonitoredVehicleJourney?.MonitoredCall;
    const rawTime = call?.ExpectedDepartureTime || call?.AimedDepartureTime || call?.ExpectedArrivalTime || call?.AimedArrivalTime;
    if (!rawTime) return null;
    const depTime = new Date(rawTime);
    const diffMins = Math.round((depTime - now) / 60000);
    const adjustedMins = diffMins - walkMinutes;
    return { visit: v, depTime, diffMins, adjustedMins };
  }).filter(Boolean);

  // Split missed vs catchable (based on walk time)
  const missed = withTiming.filter(t => t.adjustedMins <= 0);
  const catchable = withTiming.filter(t => t.adjustedMins > 0);

  // Calculate frequency from all trains
  let freqMin = null;
  if (withTiming.length >= 2) {
    const gaps = [];
    for (let j = 1; j < withTiming.length; j++) {
      const gap = Math.round((withTiming[j].depTime - withTiming[j - 1].depTime) / 60000);
      if (gap > 0 && gap < 30) gaps.push(gap);
    }
    if (gaps.length > 0) {
      freqMin = Math.round(gaps.reduce((a, b) => a + b, 0) / gaps.length);
    }
  }

  // If no catchable trains, show frequency + next estimated
  if (catchable.length === 0) {
    let freqHtml = '';
    if (freqMin) {
      // Estimate next catchable: walk time from now + next train after that
      const nextEstimated = new Date(now.getTime() + walkMinutes * 60000 + freqMin * 60000);
      const nextStr = nextEstimated.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
      const leaveEstimated = new Date(nextEstimated.getTime() - walkMinutes * 60000);
      const leaveStr = leaveEstimated.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

      freqHtml = `
        <div class="freq-banner">
          <div class="freq-value">~${freqMin} min</div>
          <div class="freq-label">frequence actuelle sur la ligne</div>
          <div class="freq-next">prochain attrapable vers <strong>${nextStr}</strong> — partir à ${leaveStr}</div>
        </div>`;
    } else {
      freqHtml = `<div class="error-card">Aucun passage attrapable — verifie les perturbations</div>`;
    }
    container.innerHTML = freqHtml;
    return;
  }

  // Normal display: max 1 missed + 2 catchable
  const toShow = [];
  if (missed.length > 0) toShow.push(missed[missed.length - 1]);
  toShow.push(...catchable.slice(0, MAX_TRAINS - toShow.length));

  // Add frequency info if available
  let freqTag = '';
  if (freqMin) {
    freqTag = `<div style="text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:-4px">frequence ~${freqMin} min</div>`;
  }

  if (toShow.length === 0) {
    container.innerHTML = `<div class="error-card">Aucun passage trouve pour cette station.</div>`;
    return;
  }

  container.innerHTML = toShow.map((t, i) => {
    const journey = t.visit.MonitoredVehicleJourney;
    const dest = journey?.DestinationName?.[0]?.value || 'Inconnu';
    const mission = journey?.JourneyNote?.[0]?.value || '';
    const timeStr = t.depTime.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

    const leaveAt = new Date(t.depTime.getTime() - walkMinutes * 60000);
    const leaveStr = leaveAt.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

    let urgencyClass = '';
    let minsClass = 'ok';
    let minsDisplay, minsLabel, leaveLabel;

    if (t.adjustedMins === 0) {
      urgencyClass = 'soon';
      minsClass = 'warn';
      minsDisplay = 'NOW⚡️';
      minsLabel = '';
      leaveLabel = `partir à ${leaveStr}`;
    } else if (t.adjustedMins < 0) {
      urgencyClass = 'urgent';
      minsClass = 'danger';
      minsDisplay = 'rate';
      minsLabel = '';
      leaveLabel = `parti à ${leaveStr}`;
    } else {
      if (t.adjustedMins <= 3) { urgencyClass = 'soon'; minsClass = 'warn'; }
      minsDisplay = `${t.adjustedMins}`;
      minsLabel = 'min';
      leaveLabel = `partir à ${leaveStr}`;
    }

    return `
      <div class="train-card ${urgencyClass}" style="animation-delay:${i * 0.07}s">
        <div class="time-block">
          <div class="time-display">${timeStr}</div>
          <div class="time-real">depart</div>
        </div>
        <div class="train-info">
          <div class="destination">${dest}</div>
          ${mission ? `<div class="mission-code">${mission}</div>` : ''}
        </div>
        <div class="countdown">
          <div class="mins ${minsClass}">${minsDisplay}</div>
          <div class="mins-label">${minsLabel}</div>
          <div class="leave-time${t.adjustedMins < 0 ? ' late' : ''}">${leaveLabel}</div>
        </div>
      </div>`;
  }).join('') + freqTag;
}

// ─── RENDER PERTURBATIONS ─────────────────────────────────

// Deep extract text from nested SIRI objects
function extractTexts(obj, depth) {
  if (!obj || depth > 8) return [];
  if (typeof obj === 'string') return obj.length > 20 ? [obj] : [];
  if (Array.isArray(obj)) return obj.flatMap(item => extractTexts(item, depth + 1));
  if (typeof obj === 'object') {
    const results = [];
    for (const key of ['value', 'MessageText', 'Content', 'Message', 'InfoMessageVersion']) {
      if (obj[key] !== undefined) results.push(...extractTexts(obj[key], depth + 1));
    }
    if (results.length === 0) {
      for (const val of Object.values(obj)) results.push(...extractTexts(val, depth + 1));
    }
    return results;
  }
  return [];
}

// Detect severity from InfoChannelRef or keywords
function detectSeverity(message, text) {
  const channel = (message.InfoChannelRef?.value || message.InfoChannelRef || '').toLowerCase();
  let sev = 'info';
  if (channel === 'perturbation') sev = 'critical';
  else if (channel === 'information') sev = 'info';
  else {
    const t = text.toLowerCase();
    if (['interrompu','supprim','aucun train','aucun metro','trafic nul','arret','fermetur','incident grave'].some(k => t.includes(k))) sev = 'critical';
    else if (['perturb','ralenti','retard','limit','travaux','interruption partielle','forte affluence'].some(k => t.includes(k))) sev = 'warn';
  }
  return sev;
}

// Check if perturbation affects MY route or another branch
function checkRouteRelevance(text) {
  const station = STATIONS[currentStation];
  const t = text.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const normalize = s => s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();

  const beyond = station.beyondTerminal || [];

  // First check "entre X et Y" / "de X a Y" patterns — most precise
  const deA = t.match(/(?:entre|de)\s+([a-z\s'''.,•·\-]+?)\s+(?:et|a|à)\s+([a-z\s'''.,•·\-]+?)(?:\s+en\b|\s+du\b|\s+le\b|\s+pour\b|\s*[.,;]|$)/);
  if (deA) {
    const seg1 = deA[1].trim();
    const seg2 = deA[2].trim();
    const seg1Mine = station.myStops.some(s => seg1.includes(normalize(s)));
    const seg2Mine = station.myStops.some(s => seg2.includes(normalize(s)));
    const seg1Other = station.otherBranch.some(s => seg1.includes(normalize(s)));
    const seg2Other = station.otherBranch.some(s => seg2.includes(normalize(s)));
    const seg1Beyond = beyond.some(s => seg1.includes(normalize(s)));
    const seg2Beyond = beyond.some(s => seg2.includes(normalize(s)));

    // Both endpoints beyond my terminal → not my problem
    if (seg1Beyond && seg2Beyond) return 'other';
    // Both endpoints on other branch → not my problem
    if (seg1Other && seg2Other) return 'other';
    // One beyond + one other branch → not my problem
    if ((seg1Beyond && seg2Other) || (seg1Other && seg2Beyond)) return 'other';
    // Both endpoints on my route → clearly my problem
    if (seg1Mine && seg2Mine) return 'mine';
    // One mine + one beyond terminal = segment goes past my destination
    // e.g. "entre Chatelet et Mitry" = north of Chatelet = not my route
    if ((seg1Mine && seg2Beyond) || (seg2Mine && seg1Beyond)) return 'other';
    // One mine + one other branch (south) = disruption passes through my stop
    // e.g. "entre Denfert et Robinson" = affects Denfert which is on my route
    if ((seg1Mine && seg2Other) || (seg2Mine && seg1Other)) return 'mine';
    // One known, one unknown
    if (seg1Beyond || seg2Beyond) return 'other';
    if (seg1Other || seg2Other) return 'partial';
    if (seg1Mine || seg2Mine) return 'partial';
  }

  // Fallback: check general mentions
  const mentionsBeyond = beyond.some(s => t.includes(normalize(s)));
  const mentionsOther = station.otherBranch.some(s => t.includes(normalize(s)));
  const mentionsMine = station.myStops.some(s => t.includes(normalize(s)));

  if ((mentionsOther || mentionsBeyond) && !mentionsMine) return 'other';
  if (mentionsMine && !mentionsOther && !mentionsBeyond) return 'mine';
  if (mentionsMine && (mentionsOther || mentionsBeyond)) return 'partial';
  return 'unknown';
}

// Parse French date expressions from perturbation text
function parsePlanningFromText(text) {
  const now = new Date();
  const currentYear = now.getFullYear();
  const plans = [];

  const MONTHS = {
    'janvier':0,'fevrier':1,'février':1,'mars':2,'avril':3,'mai':4,'juin':5,
    'juillet':6,'aout':7,'août':7,'septembre':8,'octobre':9,'novembre':10,'decembre':11,'décembre':11
  };

  function parseDate(dayStr, monthStr, hourStr) {
    const day = parseInt(dayStr);
    const month = MONTHS[monthStr.toLowerCase()];
    if (month === undefined || isNaN(day)) return null;
    const d = new Date(currentYear, month, day);
    if (hourStr) {
      const h = parseInt(hourStr);
      if (!isNaN(h)) d.setHours(h, 0, 0);
    }
    // If date is far in the past, try next year
    if (d < new Date(currentYear, now.getMonth() - 2, 1)) d.setFullYear(currentYear + 1);
    return d;
  }

  function fmt(d) {
    return d.toLocaleDateString('fr-FR', { weekday: 'short', day: 'numeric', month: 'short' });
  }
  function fmtH(d) {
    return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }

  const t = text.replace(/\s+/g, ' ');
  let foundDate = null; // track the main date for "jusqu'a Xh" context

  // "du 5 avril au 12 avril" / "du 1er mai au 5 mai" / "du 5 au 12 avril"
  const duAu = t.match(/du\s+(\d{1,2})(?:er)?\s+(\w+)\s+au\s+(\d{1,2})(?:er)?\s+(\w+)/i)
            || t.match(/du\s+(\d{1,2})(?:er)?\s+au\s+(\d{1,2})(?:er)?\s+(\w+)/i);
  if (duAu) {
    let from, to;
    if (duAu.length === 5) {
      from = parseDate(duAu[1], duAu[2]);
      to = parseDate(duAu[3], duAu[4]);
    } else {
      from = parseDate(duAu[1], duAu[3]);
      to = parseDate(duAu[2], duAu[3]);
    }
    if (from && to) {
      const isNow = now >= from && now <= new Date(to.getTime() + 86400000);
      plans.push({ from, to, isNow, label: `${fmt(from)} → ${fmt(to)}` });
      foundDate = from;
    }
  }

  // "le 5 avril" / "le 1er avril" / "le 5 avril de 5h à 14h"
  const leDate = t.match(/le\s+(\d{1,2})(?:er)?\s+(\w+)(?:\s+de\s+(\d{1,2})h?\s*[àa]\s*(\d{1,2})h?)?/i);
  if (leDate && !duAu) {
    const d = parseDate(leDate[1], leDate[2]);
    if (d) {
      foundDate = d;
      let label = fmt(d);
      let from = new Date(d), to = new Date(d.getTime() + 86400000);
      if (leDate[3] && leDate[4]) {
        from = new Date(d); from.setHours(parseInt(leDate[3]), 0);
        to = new Date(d); to.setHours(parseInt(leDate[4]), 0);
        label += ` ${leDate[3]}h-${leDate[4]}h`;
      }
      // Check for "jusqu'a Xh" in same text → combine with this date
      const jusquaH = t.match(/jusqu[''`](?:au|à)\s+(\d{1,2})[h:]\s*(\d{0,2})/i);
      if (jusquaH) {
        to = new Date(d);
        to.setHours(parseInt(jusquaH[1]), parseInt(jusquaH[2] || '0'), 0);
        label = `${fmt(d)} jusqu'a ${jusquaH[1]}h${jusquaH[2] || ''}`;
      }
      const isNow = now >= from && now <= to;
      plans.push({ from, to, isNow, label });
    }
  }

  // "à partir du 5 avril" / "à partir du 1er avril"
  const aPartir = t.match(/[àa]\s*partir\s+du\s+(\d{1,2})(?:er)?\s+(\w+)/i);
  if (aPartir && !duAu && !leDate) {
    const d = parseDate(aPartir[1], aPartir[2]);
    if (d) {
      foundDate = d;
      const isNow = now >= d;
      plans.push({ from: d, to: null, isNow, label: `a partir du ${fmt(d)}` });
    }
  }

  // "jusqu'au 5 avril" (date, not just time - only if no "le" date found)
  if (!leDate) {
    const jusquaDate = t.match(/jusqu[''`](?:au|à)\s+(\d{1,2})(?:er)?\s+(\w+)/i);
    if (jusquaDate) {
      const d = parseDate(jusquaDate[1], jusquaDate[2]);
      if (d) {
        // Use today as start if no other date found
        const from = foundDate || new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const isNow = now <= new Date(d.getTime() + 86400000);
        plans.push({ from, to: d, isNow, label: `jusqu'au ${fmt(d)}` });
      }
    }
  }

  return plans;
}

function renderPerturbations(messages) {
  const container = document.getElementById('perturbations');

  console.log('Perturbations brutes:', JSON.stringify(messages.slice(0, 2), null, 2));

  const active = messages.filter(m => {
    const validity = m.ValidUntilTime;
    if (!validity) return true;
    return new Date(validity) > new Date();
  });

  if (active.length === 0) {
    container.innerHTML = `
      <div class="no-perturbation">
        <span>✓</span> Trafic normal sur la ligne ${STATIONS[currentStation].lineName}
      </div>`;
    document.getElementById('planning-section').style.display = 'none';
    return;
  }

  // Pre-process all perturbations with metadata for sorting
  const allPlans = [];
  const now2 = new Date();
  const todayStart = new Date(now2.getFullYear(), now2.getMonth(), now2.getDate());
  const todayEnd = new Date(todayStart.getTime() + 86400000);

  const processed = active.map(m => {
    const allTexts = extractTexts(m, 0);
    const content = allTexts.sort((a, b) => b.length - a.length)[0] || 'Perturbation en cours';
    let severity = detectSeverity(m, content);
    const route = checkRouteRelevance(content);
    const plans = parsePlanningFromText(content);

    // Downgrade severity
    if (route === 'other' || route === 'partial') severity = 'info';
    const allFuture = plans.length > 0 && plans.every(p => p.from && p.from > now2);
    if (allFuture && severity === 'critical') severity = 'warn';

    // Check if affects today
    const affectsToday = plans.some(p => {
      const from = p.from || todayStart;
      const to = p.to ? new Date(p.to.getTime() + 86400000) : todayEnd;
      return todayStart < to && todayEnd > from;
    });
    // Earliest date for sorting
    const earliestDate = plans.reduce((min, p) => {
      if (p.from && (!min || p.from < min)) return p.from;
      return min;
    }, null);

    return { m, content, severity, route, plans, affectsToday, earliestDate };
  });

  // Sort: today first, then by earliest date, then unknown dates last
  processed.sort((a, b) => {
    if (a.affectsToday && !b.affectsToday) return -1;
    if (!a.affectsToday && b.affectsToday) return 1;
    if (a.earliestDate && b.earliestDate) return a.earliestDate - b.earliestDate;
    if (a.earliestDate) return -1;
    if (b.earliestDate) return 1;
    return 0;
  });

  container.innerHTML = processed.slice(0, 5).map((item, i) => {
    const { content, severity, route, plans } = item;
    const isActive = plans.some(p => p.isNow);

    plans.forEach(p => allPlans.push({ ...p, severity }));

    const sevClass = `sev-${severity}`;
    const activeClass = isActive ? ' is-active' : '';
    const sevIcon = severity === 'critical' ? '⛔' : severity === 'warn' ? '⚠' : 'ℹ';
    const sevLabel = severity === 'critical' ? 'Perturbation' : severity === 'warn' ? 'Info trafic' : 'Information';

    let routeTag = '';
    if (route === 'other') routeTag = '<span class="pert-branch-tag other">autre branche</span>';
    else if (route === 'mine') routeTag = '<span class="pert-branch-tag mine">mon trajet</span>';
    else if (route === 'partial') routeTag = '<span class="pert-branch-tag other">partiel</span>';

    let planningHtml = '';
    if (plans.length > 0) {
      const now = new Date();
      planningHtml = `<div class="pert-planning">${plans.map(p => {
        const dotClass = p.isNow ? 'plan-dot now' : 'plan-dot';
        const status = p.isNow ? ' (en cours)' : (p.from && p.from > now ? ' (a venir)' : '');
        return `<div class="plan-row"><span class="${dotClass}"></span>${p.label}${status}</div>`;
      }).join('')}</div>`;
    }

    return `
      <div class="perturbation-card ${sevClass}${activeClass}" style="animation-delay:${i * 0.08}s">
        <div class="pert-title">${sevIcon} ${sevLabel}${routeTag}</div>
        <div class="pert-content">${content}</div>
        ${planningHtml}
      </div>`;
  }).join('');

  // Render calendar planning
  renderPlanningCalendar(allPlans);
}

// ─── PLANNING CALENDAR (3 months, week by week) ──────────
function renderPlanningCalendar(plans) {
  const section = document.getElementById('planning-section');
  const cal = document.getElementById('planning-calendar');

  // Only keep plans with actual date ranges (both from and to must exist)
  const datedPlans = plans.filter(p => p.from && p.to);

  if (datedPlans.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = 'block';
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  // Start from monday of current week
  const startOfWeek = new Date(today);
  const dow = startOfWeek.getDay() || 7;
  startOfWeek.setDate(startOfWeek.getDate() - (dow - 1));

  // Find the last perturbation date to limit calendar
  let lastPertDate = new Date(0);
  for (const p of datedPlans) {
    if (p.to && p.to > lastPertDate) lastPertDate = p.to;
  }
  // Add 1 week buffer after last perturbation
  const calEnd = new Date(lastPertDate.getTime() + 7 * 86400000);
  // Cap at 13 weeks
  const maxEnd = new Date(startOfWeek.getTime() + 13 * 7 * 86400000);
  const effectiveEnd = calEnd < maxEnd ? calEnd : maxEnd;

  const dayLabels = ['L','M','M','J','V','S','D'];

  // Check if a day falls within any perturbation period
  function getDayStatus(day) {
    let maxSev = null;
    const dayEnd = new Date(day.getTime() + 86400000);
    for (const p of datedPlans) {
      const from = p.from;
      const to = new Date(p.to.getTime() + 86400000);
      if (day < to && dayEnd > from) {
        if (p.severity === 'critical') return 'critical';
        if (p.severity === 'warn') maxSev = 'warn';
        else if (!maxSev) maxSev = 'info';
      }
    }
    return maxSev;
  }

  const monthNames = ['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];

  let html = `<div class="planning-day-labels">${dayLabels.map(d => `<span>${d}</span>`).join('')}</div>`;
  html += '<div class="planning-grid">';

  let w = 0;
  while (true) {
    const weekStart = new Date(startOfWeek);
    weekStart.setDate(weekStart.getDate() + w * 7);
    if (weekStart >= effectiveEnd) break;

    const label = `${weekStart.getDate()} ${monthNames[weekStart.getMonth()]}`;
    const weekEnd = new Date(weekStart.getTime() + 7 * 86400000);
    const isCurrentWeek = today >= weekStart && today < weekEnd;
    html += `<div class="planning-week${isCurrentWeek ? ' current-week' : ''}"><div class="planning-week-label">${label}</div>`;

    for (let d = 0; d < 7; d++) {
      const day = new Date(weekStart);
      day.setDate(day.getDate() + d);

      const isToday = day.getTime() === today.getTime();
      const isPast = day < today;
      const status = getDayStatus(day);

      let classes = 'planning-day';
      if (isToday) classes += ' today';
      if (isPast) classes += ' past';
      if (status === 'critical') classes += ' has-critical';
      else if (status === 'warn' || status === 'info') classes += ' has-pert';

      html += `<div class="${classes}"></div>`;
    }
    html += '</div>';
    w++;
  }

  html += '</div>';
  cal.innerHTML = html;
}

// ─── THEME ────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isLight ? '🌙' : '☀️';
}

function applyTheme() {
  const saved = localStorage.getItem('theme');
  // Default to light
  const preferLight = saved ? saved === 'light' : true;
  if (preferLight) {
    document.documentElement.classList.add('light');
    document.getElementById('theme-btn').textContent = '🌙';
  } else {
    document.documentElement.classList.remove('light');
    document.getElementById('theme-btn').textContent = '☀️';
  }
}

// ─── INIT ─────────────────────────────────────────────────
function init() {
  applyTheme();
  loadWalkForStation();

  const apiKey = getApiKey();
  if (!apiKey) {
    document.getElementById('setup-panel').style.display = 'block';
    document.getElementById('trains-list').innerHTML = '';
    document.getElementById('perturbations').innerHTML = '';
  } else {
    document.getElementById('station-selector').classList.add('visible');
    fetchData();
    refreshTimer = setInterval(fetchData, REFRESH_INTERVAL);
  }

  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }
}

init();
</script>
